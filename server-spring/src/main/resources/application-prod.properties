# ─── Production Profile ─────────────────────────────────────────────────────
# Activated on Render via SPRING_PROFILES_ACTIVE=prod
# All env vars MUST be set on Render dashboard for the app to work properly.
# Defaults are provided so the app can start and show a clear error if missing.

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:3001}

# ─── Database (set DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD on Render)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sos_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

# ─── Hibernate ───────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ─── Jackson ─────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Request Size Limits ─────────────────────────────────────────────────────
server.tomcat.max-http-form-post-size=1MB
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB

# ─── Rate Limiting ───────────────────────────────────────────────────────────
rate-limit.login.max-attempts=10
rate-limit.login.window-ms=300000

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:default-change-me-in-production}
jwt.expiration-ms=600000
jwt.max-session-seconds=43200

# ─── CORS (same origin — frontend served by Spring Boot) ────────────────────
cors.allowed-origin=${CORS_ORIGIN:https://sosterminal.org}

# ─── Socket.IO ───────────────────────────────────────────────────────────────
socketio.host=0.0.0.0
socketio.port=${SOCKETIO_PORT:3002}
